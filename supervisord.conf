[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:apache2]
command=apache2-foreground
autostart=true
autorestart=true
stderr_logfile=/var/log/apache2/error.log
stdout_logfile=/var/log/apache2/access.log

[program:bridge]
command=node bridge.js
directory=/var/www/html
autostart=true
autorestart=true
stderr_logfile=/var/log/bridge.err.log
stdout_logfile=/var/log/bridge.out.log